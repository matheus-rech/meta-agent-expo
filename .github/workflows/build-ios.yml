name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --legacy-peer-deps

      - name: Fix lightningcss for macOS arm64
        run: |
          # lightningcss in react-native-css-interop needs the darwin-arm64 native binary
          # npm install on Linux lockfile doesn't include it
          CSS_LC=node_modules/react-native-css-interop/node_modules/lightningcss
          if [ -d "$CSS_LC" ]; then
            LCVER=$(node -p "require('./$CSS_LC/package.json').version")
            echo "Installing lightningcss-darwin-arm64@$LCVER into $CSS_LC"
            cd "$CSS_LC"
            npm install "lightningcss-darwin-arm64@$LCVER" --no-save 2>&1 || true
            ls -la *.node node_modules/lightningcss-darwin-arm64/ 2>/dev/null
          fi

      - name: Generate native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found: workspace=$WORKSPACE scheme=$SCHEME"

      - name: Build simulator .app (no signing)
        run: |
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -quiet \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/Build/Products/Release-iphonesimulator/*.app

